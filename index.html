<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invoice Viewer</title>

<style>

body{
    font-family: Arial;
    background:#f5f6f8;
    padding:30px;
}

.invoice{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:10px;
}

.header{
    display:flex;
    justify-content:space-between;
}

h1{
    margin:0;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#eee;
}

.total{
    text-align:right;
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

.loading{
    text-align:center;
    margin-top:100px;
}

button{
    position:fixed;
    top:20px;
    right:20px;
    padding:10px 15px;
}

</style>

</head>

<body>

<button onclick="window.print()">Print</button>

<div id="loading">Loading invoice...</div>

<div class="invoice" id="invoice" style="display:none;">

    <div class="header">
        <h1>INVOICE</h1>
        <div id="invoiceNumber"></div>
    </div>

    <p><b>Client:</b> <span id="client"></span></p>
    <p><b>Issue Date:</b> <span id="issue"></span></p>
    <p><b>Due Date:</b> <span id="due"></span></p>

    <table>
        <thead>
            <tr>
                <th>Campaign</th>
                <th>Amount</th>
            </tr>
        </thead>
        <tbody id="rows"></tbody>
    </table>

    <div class="total">
        Total: <span id="total"></span>
    </div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const AIRTABLE_TOKEN = "patXXXX_REVOKE_ET"; // ⚠️ bunu sonra sil
const BASE_ID = "appaW9XYnzJNp4fpi";
const TABLE = "📄 Invoices";

/* =========================
   URL PARAM (Invoice Number)
========================= */

const params = new URLSearchParams(window.location.search);
const invoiceNumber = params.get("number");

if (!invoiceNumber) {
    throw new Error("Invoice number yoxdur");
}

/* =========================
   FETCH INVOICE (FILTER BY FORMULA)
========================= */

async function loadInvoice() {

    const url =
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE)}` +
        `?filterByFormula=${encodeURIComponent(`{Invoice Number}="${invoiceNumber}"`)}`;

    const res = await fetch(url, {
        headers: {
            Authorization: `Bearer ${AIRTABLE_TOKEN}`
        }
    });

    const data = await res.json();

    console.log("Airtable response:", data);

    if (!data.records || data.records.length === 0) {
        throw new Error("Invoice tapilmadi: " + invoiceNumber);
    }

    const record = data.records[0];

    render(record.fields);
}

/* =========================
   RENDER
========================= */

function render(fields) {

    document.getElementById("invoiceNumber").innerText =
        fields["Invoice Number"] || "";

    document.getElementById("client").innerText =
        fields["Client"] || "";

    document.getElementById("issue").innerText =
        fields["Issue Date"] || "";

    document.getElementById("due").innerText =
        fields["Due Date"] || "";

    document.getElementById("total").innerText =
        (fields["Total Amount (AZN)"] || "") + " AZN";

    /* =========================
       CAMPAIGNS (linked records fix)
    ========================= */

    const campaigns = fields["Campaign"] || [];

    const tbody = document.getElementById("rows");
    tbody.innerHTML = "";

    campaigns.forEach(c => {

        const name =
            typeof c === "string"
                ? c
                : c.name || c;

        tbody.innerHTML += `
            <tr>
                <td>${name}</td>
                <td>-</td>
            </tr>
        `;
    });

    document.getElementById("loading").style.display = "none";
    document.getElementById("invoice").style.display = "block";
}

/* =========================
   INIT
========================= */

loadInvoice();

</script>

</body>
</html>
