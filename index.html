<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hesab</title>
<style>
  :root{
    --ink:#1a1a1a; --muted:#555; --line:#bbb; --head:#111827;
    --paper:#ffffff; --pagew:210mm; --brand:#1f8a8a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:#e9ebee; color:var(--ink);
    font-family:"Times New Roman", Times, Georgia, serif;
    font-size:14px; line-height:1.5;
  }

  /* ---------- Toolbar (screen only) ---------- */
  .toolbar{
    position:sticky; top:0; z-index:10;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 16px; background:#111827; color:#fff;
    font-family:Arial, sans-serif;
  }
  .toolbar label{font-size:12px; color:#9ca3af;}
  .toolbar select{
    padding:7px 10px; border-radius:6px; border:1px solid #374151;
    background:#1f2937; color:#fff; font-size:13px; min-width:240px;
  }
  .toolbar button{
    padding:8px 16px; border:0; border-radius:6px; cursor:pointer;
    background:#2563eb; color:#fff; font-size:13px; font-weight:600;
  }
  .toolbar button:hover{background:#1d4ed8;}
  .toolbar .status{font-size:12px; color:#9ca3af; margin-left:auto;}

  /* ---------- Page / paper ---------- */
  .sheet{padding:24px; display:flex; justify-content:center;}
  .page{
    width:var(--pagew); background:var(--paper);
    padding:18mm 16mm; box-shadow:0 1px 6px rgba(0,0,0,.15);
  }

  /* ---------- Logo ---------- */
  .logo-wrap{margin-bottom:22px;}
  .logo-wrap img{max-height:70px; max-width:320px; object-fit:contain;}
  .logo-fallback{
    font-size:26px; font-weight:700; color:var(--brand);
    font-style:italic; letter-spacing:.5px;
  }

  /* ---------- Sender / meta lines ---------- */
  .row{display:flex; gap:16px; margin:10px 0;}
  .row .lbl{min-width:170px; font-weight:700;}
  .sender-name{margin-left:329px; font-weight:700; line-height:1.4;}
  .block{margin:23px 0;}
  .block b{font-weight:700;}

  .title{text-align:center; margin:26px 0 4px; font-size:20px; font-weight:700;}
  .subtitle{text-align:center; font-size:16px; font-weight:700; margin-bottom:18px;}
  .contract{font-weight:700; margin:14px 0 6px;}

  /* ---------- Line items (dark header kept, full borders added) ---------- */
  table.items{width:100%; border-collapse:collapse; margin-top:14px; font-size:13px;}
  table.items thead th{
    background:var(--head); color:#fff; text-align:left; padding:9px 10px;
    font-weight:600; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px;
    border:1px solid #2b3447;
  }
  table.items tbody td{padding:8px 10px; border:1px solid var(--line);}
  table.items .num{text-align:right; white-space:nowrap;}
  table.items tbody tr:nth-child(even){background:#fafafa;}

  /* ---------- Totals (AZ style) ---------- */
  .totals{display:flex; justify-content:flex-end; margin-top:14px;}
  .totals table{border-collapse:collapse; min-width:300px;}
  .totals td{padding:4px 8px;}
  .totals td.k{text-align:right; font-weight:700;}
  .totals td.v{text-align:right; font-weight:700; white-space:nowrap;}
  .totals tr.grand td{font-size:16px; padding-top:8px;}

  .summary{margin-top:16px; font-weight:700;}
  .summary .words{font-weight:700; margin-top:2px;}

  /* ---------- Signature ---------- */
  .sign{margin-top:40px; padding-top:26px; border-top:1px solid #333;
        display:flex; justify-content:space-between; font-weight:700;}

  .empty{padding:60px; text-align:center; color:var(--muted); font-family:Arial,sans-serif;}

  /* ---------- Print ---------- */
  @page{ size:A4; margin:12mm; }
  @media print{
    body{background:#fff;}
    .toolbar{display:none !important;}
    .sheet{padding:0;}
    .page{width:auto; box-shadow:none; padding:0;}
    table.items thead{display:table-header-group;}
    table.items tr{break-inside:avoid;}
    .totals,.summary,.sign{break-inside:avoid;}
  }
</style>
</head>
<body>

  <div class="toolbar">
    <label for="invSel">Hesab</label>
    <select id="invSel"></select>
    <button id="printBtn">Çap / PDF</button>
    <span class="status" id="status">Yüklənir…</span>
  </div>

  <div class="sheet">
    <div class="page" id="page">
      <div class="empty">Hesab seçin…</div>
    </div>
  </div>

<script>
/* ============================================================
   CONFIG  —  TOKEN client-side saxlanılır, yalnız READ-ONLY
   token istifadə edin (scope: data.records:read). Publik commit etməyin.
   ============================================================ */
const CONFIG = {
  TOKEN: "patBXfNSVLkFxR8Wo.40a7cde49a65ebe3b81a51ac7acdf4e1990834bb5856ccb8ac7e9969d7c6d112",
  BASE:  "appaW9XYnzJNp4fpi",
  T_INVOICES: "tblGsNml3qIAA29pT",
  T_CAMPAIGNS:"tbl8EromseyPeHgL6",
  T_CLIENTS:  "tblmSmQm9EOvhThoO",
  T_COMPANY:  "tblqR2FsfeuX6S8t5",
  CURRENCY:   "AZN"
};

/* ============================================================
   STATİK GÖNDƏRƏN MƏLUMATLARI  (hələ dinamik deyil — buradan dəyişin)
   LOGO:  logo faylını invoice.html ilə eyni qovluğa (repo-ya) qoyun.
   ============================================================ */
const SENDER = {
  LOGO: "newmedia_logo.svg",
  name: '"Nyu Media.az" MMC',
  voen: "1301997231",
  address: "AZ 1003, Bakı ş., Səbail r-nu, Neftçi Qurban Abbasov 43, Bayil Bay Plaza",
  bankReqs: 'KapitalBank ASC, Port Baku filialı , VÖEN: 9900003611, H/H: AZ90AIIB40060019440435186107, M/H: AZ37NABZ01350100000000001944 , Kod: 201973, SWIFT: AIIBAZ2XXXX',
  contractLine: "20 Fevral, 2025 tarixli, AZRC/2025/19 nömrəli müqaviləyə əsasən",
  director: "Sadıq Zadə Elxan Urmuz oğlu"
};

const API = `https://api.airtable.com/v0/${CONFIG.BASE}`;
const H = { Authorization:`Bearer ${CONFIG.TOKEN}` };
const $ = id => document.getElementById(id);
const setStatus = m => $("status").textContent = m;

async function apiGet(path){
  const r = await fetch(`${API}/${path}`, { headers:H });
  if(!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}
async function fetchAll(tableId){
  let out=[], offset;
  do{
    const q = offset ? `?offset=${offset}` : "";
    const d = await apiGet(`${tableId}${q}`);
    out = out.concat(d.records);
    offset = d.offset;
  } while(offset);
  return out;
}
async function fetchAllLabeled(label, tableId){
  try{ return await fetchAll(tableId); }
  catch(err){ throw new Error(`[${label}] ${err.message}`); }
}
const byId = recs => Object.fromEntries(recs.map(r=>[r.id, r.fields]));
const first = v => Array.isArray(v) ? v[0] : v;
const esc = s => String(s??"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

/* ---------- AZ formatlama ---------- */
const AZ_MONTHS=["Yanvar","Fevral","Mart","Aprel","May","İyun",
                 "İyul","Avqust","Sentyabr","Oktyabr","Noyabr","Dekabr"];
function fmtDateAz(s){
  if(!s) return "";
  const d=new Date(s);
  if(isNaN(d)) return s;
  return `${d.getDate()} ${AZ_MONTHS[d.getMonth()]}, ${d.getFullYear()}-ci il`;
}
function moneyAz(n){
  return Number(n||0).toLocaleString("az-AZ",{minimumFractionDigits:2,maximumFractionDigits:2});
}

/* ---------- Rəqəmi sözlə (AZ) ---------- */
function azWords(n){
  const ones=["","bir","iki","üç","dörd","beş","altı","yeddi","səkkiz","doqquz"];
  const tens=["","on","iyirmi","otuz","qırx","əlli","altmış","yetmiş","səksən","doxsan"];
  function below1000(num){
    const out=[];
    const h=Math.floor(num/100), t=Math.floor((num%100)/10), o=num%10;
    if(h) out.push((h>1?ones[h]+" ":"")+"yüz");
    if(t) out.push(tens[t]);
    if(o) out.push(ones[o]);
    return out.join(" ");
  }
  n=Math.floor(n);
  if(n===0) return "sıfır";
  const parts=[];
  const milyard=Math.floor(n/1e9); n%=1e9;
  const milyon =Math.floor(n/1e6); n%=1e6;
  const min    =Math.floor(n/1e3); n%=1e3;
  if(milyard) parts.push(below1000(milyard)+" milyard");
  if(milyon)  parts.push(below1000(milyon)+" milyon");
  if(min)     parts.push((min>1?below1000(min)+" ":"")+"min");
  if(n)       parts.push(below1000(n));
  return parts.join(" ").trim();
}
function amountInWords(total){
  const manat=Math.floor(total);
  const qepik=Math.round((total-manat)*100);
  let w=azWords(manat);
  w=w.charAt(0).toUpperCase()+w.slice(1);
  return `${w} AZN ${String(qepik).padStart(2,"0")}`;
}

let CAMPAIGNS={}, CLIENTS={}, COMPANIES={};

async function init(){
  if(location.protocol==="file:"){
    $("page").innerHTML=`<div class="empty">Bu səhifə birbaşa diskdən (file://) açılıb.<br>Brauzer bu rejimdə API sorğularını bloklayır — canlı GitHub Pages linkindən açın.</div>`;
    setStatus("Bloklandı: file://"); return;
  }
  try{
    setStatus("Məlumatlar yüklənir…");
    const [invs, camps, clients, comps] = await Promise.all([
      fetchAllLabeled("Invoices", CONFIG.T_INVOICES),
      fetchAllLabeled("Campaigns", CONFIG.T_CAMPAIGNS),
      fetchAllLabeled("Clients", CONFIG.T_CLIENTS),
      fetchAllLabeled("Company", CONFIG.T_COMPANY),
    ]);
    CAMPAIGNS=byId(camps); CLIENTS=byId(clients); COMPANIES=byId(comps);

    const sel=$("invSel");
    invs.sort((a,b)=>String(b.fields["Invoice Number"]||"").localeCompare(String(a.fields["Invoice Number"]||"")));
    sel.innerHTML=invs.map(r=>{
      const f=r.fields, c=CLIENTS[first(f.Client)]?.["Client Name"]||"";
      return `<option value="${r.id}">${esc(f["Invoice Number"]||r.id)} — ${esc(c)}</option>`;
    }).join("");
    sel.onchange=()=>{ const r=invs.find(x=>x.id===sel.value); render(r.fields); };

    const qs=new URLSearchParams(location.search);
    const wantedNumber=qs.get("number");
    const wantedId=qs.get("id");
    let start=null;
    if(wantedNumber){
      start=invs.find(r=>String(r.fields["Invoice Number"]||"").trim().toLowerCase()===wantedNumber.trim().toLowerCase());
      if(!start){ $("page").innerHTML=`<div class="empty">Hesab tapılmadı: <b>${esc(wantedNumber)}</b></div>`; setStatus("Tapılmadı"); return; }
    } else if(wantedId){
      start=invs.find(r=>r.id===wantedId);
    }
    if(!start) start=invs[0];
    if(!start){ $("page").innerHTML=`<div class="empty">Heç bir hesab tapılmadı.</div>`; setStatus(""); return; }
    sel.value=start.id;
    render(start.fields);
    setStatus(`${invs.length} hesab yükləndi`);
  }catch(e){
    setStatus("Xəta");
    $("page").innerHTML=`<div class="empty">Yüklənmə alınmadı.<br><small>${esc(e.message)}</small></div>`;
    console.error(e);
  }
}

function render(f){
  const client = CLIENTS[first(f.Client)] || {};

  const company = COMPANIES[first(f["Your company"])] || {};
  const airtableLogo = first(company["Your logo"])?.url || first(f["(Hidden) Your logo"])?.url || "";
  const logoSrc = SENDER.LOGO || airtableLogo;

  const ids = f.Campaign || [];
  const rows = ids.map(id=>CAMPAIGNS[id]).filter(Boolean);
  let subTotal=0, taxTotal=0;
  const body = rows.map((c,i)=>{
    const amt=Number(c["Amount (AZN)"]||0), tax=Number(c["Tax amount (AZN)"]||0),
          tot=Number(c["Total Amount (AZN)"]||amt+tax), cnt=c["Count"]??1;
    subTotal+=amt; taxTotal+=tax;
    return `<tr>
      <td class="num">${i+1}</td>
      <td>${esc(c["Campaign Name"]||"")}</td>
      <td class="num">${esc(cnt)}</td>
      <td class="num">${moneyAz(amt)}</td>
      <td class="num">${moneyAz(tot)}</td>
    </tr>`;
  }).join("");
  const grand = Number(f["Total Amount (AZN)"] ?? (subTotal+taxTotal));

  const cur = CONFIG.CURRENCY;
  const hesabNo = f["Hesab №"] || f["Invoice Number"] || "";

  const payerName = client["Client Name"] || "";
  const payerVoen = client["Client VOEN"] || "";

  $("page").innerHTML = `
    <div class="logo-wrap">
      ${logoSrc
        ? `<img src="${esc(logoSrc)}" alt="${esc(SENDER.name)}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'logo-fallback',textContent:${JSON.stringify(SENDER.name)}}))">`
        : `<div class="logo-fallback">${esc(SENDER.name)}</div>`}
    </div>

    <div class="row">
      <div class="lbl">Mal / Xidmət göndərən:</div>
      <div class="sender-name">
        ${esc(SENDER.name)}<br>VÖEN ${esc(SENDER.voen)}
      </div>
    </div>

    <div class="block"><b>Ünvan:</b> ${esc(SENDER.address)}</div>

    <div class="block"><b>Mal göndərənin rekvizitləri:</b> ${esc(SENDER.bankReqs)}</div>

    <div class="block"><b>Ödəyən müştəri:</b> ${esc(payerName)}${payerVoen?` , VÖEN: ${esc(payerVoen)}`:``}</div>

    <div class="title">HESAB № ${esc(hesabNo)}</div>
    <div class="subtitle">${fmtDateAz(f["Issue Date"])}</div>

    <div class="contract">${esc(SENDER.contractLine)}</div>

    <table class="items">
      <thead>
        <tr>
          <th class="num">№</th>
          <th>XİDMƏTLƏRİN ADI</th>
          <th class="num">MİQDAR</th>
          <th class="num">QİYMƏT (${cur})</th>
          <th class="num">MƏBLƏĞ (${cur})</th>
        </tr>
      </thead>
      <tbody>${body || `<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:24px">Sətir yoxdur</td></tr>`}</tbody>
    </table>

    <div class="totals">
      <table>
        <tr><td class="k">Məbləğ:</td><td class="v">${moneyAz(subTotal)} ${cur}</td></tr>
        <tr><td class="k">ƏDV məbləği:</td><td class="v">${moneyAz(taxTotal)} ${cur}</td></tr>
        <tr class="grand"><td class="k">Yekun:</td><td class="v">${moneyAz(grand)} ${cur}</td></tr>
      </table>
    </div>

    <div class="summary">
      <div>Cəmi ${rows.length} sətir, məbləğ ${moneyAz(grand)} ${cur}</div>
      <div class="words">Yazı ilə: ${esc(amountInWords(grand))}</div>
    </div>

    <div class="sign">
      <div>Direktor</div>
      <div>${esc(SENDER.director)}</div>
    </div>
  `;
}

$("printBtn").onclick = ()=>window.print();
init();
</script>
</body>
</html>
