<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f7fa;
    padding:40px;
    color:#222;
}

.invoice{
    max-width:1100px;
    margin:auto;
    background:#fff;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.08);
    padding:50px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:50px;
}

.logo{
    font-size:34px;
    font-weight:700;
}

.invoice-title{
    text-align:right;
}

.invoice-title h1{
    font-size:42px;
    margin-bottom:10px;
}

.invoice-number{
    color:#666;
}

.section{
    display:flex;
    justify-content:space-between;
    gap:40px;
    margin-bottom:40px;
}

.card{
    flex:1;
}

.card h3{
    font-size:14px;
    text-transform:uppercase;
    color:#777;
    margin-bottom:10px;
}

.card p{
    margin-bottom:6px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

thead{
    background:#f3f3f3;
}

th{
    text-align:left;
    padding:14px;
}

td{
    padding:14px;
    border-bottom:1px solid #eee;
}

.amount{
    text-align:right;
}

.summary{
    display:flex;
    justify-content:flex-end;
    margin-top:40px;
}

.summary-box{
    width:320px;
}

.summary-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
}

.total-row{
    border-top:2px solid #000;
    margin-top:10px;
    padding-top:15px;
    font-size:22px;
    font-weight:bold;
}

.footer{
    margin-top:60px;
    text-align:center;
    color:#999;
    font-size:12px;
}

.print-btn{
    position:fixed;
    top:20px;
    right:20px;
    border:none;
    background:#111;
    color:#fff;
    padding:12px 18px;
    border-radius:8px;
    cursor:pointer;
}

.loading{
    text-align:center;
    margin-top:100px;
    font-size:20px;
}

@page{
    size:A4;
    margin:15mm;
}

@media print{

    body{
        background:white;
        padding:0;
    }

    .invoice{
        box-shadow:none;
        border-radius:0;
        max-width:none;
        width:100%;
        padding:0;
    }

    .print-btn{
        display:none;
    }

}

</style>

</head>

<body>

<button class="print-btn" onclick="window.print()">
Print Invoice
</button>

<div id="loading" class="loading">
Loading invoice...
</div>

<div id="invoice" class="invoice" style="display:none;">

```
<div class="header">

    <div>
        <div class="logo">
            COLIBRI
        </div>
    </div>

    <div class="invoice-title">
        <h1>INVOICE</h1>
        <div id="invoiceNumber" class="invoice-number"></div>

</div>

<div class="section">

    <div class="card">

        <h3>Bill To</h3>

        <p id="clientName"></p>

    </div>

    <div class="card">

        <h3>Invoice Details</h3>

        <p>
            <b>Issue Date:</b>
            <span id="issueDate"></span>
        </p>

        <p>
            <b>Due Date:</b>
            <span id="dueDate"></span>
        </p>

    </div>

</div>

<table>

    <thead>

        <tr>
            <th>Campaign</th>
            <th>Description</th>
            <th class="amount">Amount</th>
        </tr>

    </thead>

    <tbody id="campaignRows"></tbody>

</table>

<div class="summary">

    <div class="summary-box">

        <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal"></span>
        </div>

        <div class="summary-row">
            <span>Tax</span>
            <span id="tax"></span>
        </div>

        <div class="summary-row total-row">
            <span>Total</span>
            <span id="total"></span>
        </div>

    </div>

</div>

<div class="footer">
    Generated from Airtable
</div>
```

</div>

<script>

/*
URL nümunəsi:

https://aliallahverdi.github.io/invoice/?id=rec123

const params = new URLSearchParams(window.location.search);

const invoiceId = params.get("id");

console.log("Invoice ID:", invoiceId);

/*
BU HISSƏ SONRA AIRTABLE API OLACAQ
İNDİLİK TEST DATA
*/

const invoice = {
    number:"INV-2026-001",
    client:"PASHA Bank",
    voen:"1234567890",
    issueDate:"23 Jun 2026",
    dueDate:"30 Jun 2026",
    subtotal:"1000 AZN",
    tax:"110 AZN",
    total:"1110 AZN",

    campaigns:[
        {
            name:"PASHA Google Search",
            description:"Google Search Campaign",
            amount:"500 AZN"
        },
        {
            name:"PASHA Youtube Bumper",
            description:"Youtube Ads",
            amount:"300 AZN"
        },
        {
            name:"Bravo Endirim Meta",
            description:"Meta Campaign",
            amount:"200 AZN"
        },
        {
            name:"Citynet TikTok",
            description:"TikTok Campaign",
            amount:"110 AZN"
        }
    ]
};

document.getElementById("invoiceNumber").innerText =
    invoice.number;

document.getElementById("clientName").innerText =
    invoice.client;

document.getElementById("clientVoen").innerText =
    invoice.voen;

document.getElementById("issueDate").innerText =
    invoice.issueDate;

document.getElementById("dueDate").innerText =
    invoice.dueDate;

document.getElementById("subtotal").innerText =
    invoice.subtotal;

document.getElementById("tax").innerText =
    invoice.tax;

document.getElementById("total").innerText =
    invoice.total;

const tbody =
    document.getElementById("campaignRows");

invoice.campaigns.forEach(campaign => {

    tbody.innerHTML += `
        <tr>
            <td>${campaign.name}</td>
            <td>${campaign.description}</td>
            <td class="amount">${campaign.amount}</td>
        </tr>
    `;

});

document.getElementById("loading").style.display =
    "none";

document.getElementById("invoice").style.display =
    "block";

</script>

</body>
</html>
